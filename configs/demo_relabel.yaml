project:
  name: human-matting-pipeline-demo-relabel
  root: .
  seed: 42

paths:
  raw_dir: data/demo_raw
  frames_dir: data/demo_frames
  manifest_path: data/demo_manifests/manifest.jsonl
  annotation_path: data/demo_annotations/annotations_raw.jsonl
  refined_annotation_path: data/demo_annotations/annotations_refined.jsonl
  masks_raw_dir: data/demo_masks_raw
  masks_refined_dir: data/demo_masks_refined
  yolo_dir: data/demo_yolo_seg
  alpha_dir: data/demo_alpha
  runs_dir: runs

manifest:
  media_type: image
  tags: ["demo"]

ingest:
  datasets: ["coco_rem"]
  registry_path: configs/datasets.yaml

stratification:
  output_path: data/demo_manifests/manifest.jsonl

dummy:
  width_fraction: 0.5
  height_fraction: 0.7
  score: 0.9

labeling:
  yolo_weights: /home/genesis/Train/Code/ultralytics/yolo26s-seg.pt
  yolo_conf: 0.25
  yolo_iou: 0.7
  sam2_weights: sam2_b.pt
  segment_mode: sam2
  device: 0
  max_instances: 16

local_postprocess:
  remove_small_components: true
  min_component_area: 16
  fill_holes: true
  keep_largest_component: false

refine:
  report_path: data/demo_annotations/refine_report.jsonl

adaptive_trimap:
  output_dir: data/demo_alpha/adaptive_trimaps
  roi_dir: data/demo_alpha/roi
  base_radius: 6
  max_radius: 16

trimap:
  output_dir: data/demo_alpha/trimaps
  radius: 6

relabel:
  queue_path: data/demo_alpha/relabel_queue.jsonl
  alpha_output_dir: data/demo_alpha/mattes
  fused_alpha_dir: data/demo_alpha/fused
  bbox_output_dir: data/demo_alpha/bboxes
  eval_map_dir: data/demo_alpha/eval_maps
  hitl_queue_path: data/demo_alpha/hitl_queue.jsonl
  labels_path: data/demo_alpha/alpha_labels.jsonl
  write_bbox_sidecars: true

mqe:
  output_path: data/demo_alpha/mqe_report.jsonl

logging:
  level: INFO
